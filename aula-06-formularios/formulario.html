<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <header>
        <h1>Cadastro de Aluno - DSM</h1>
        <p>A finalidade deste formulário é realizar o cadastro de alunos do curso de <abbr title="Desenvolvimento de Sistema Multiplataforma">DSM</abbr> da Fatec de Registro.</p>
    </header>
    <main>
        <!-- tema do formulário: formulário de cadastro de aluno - curso DSM -->
         <form action="#" method="POST">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="nome">Nome completo:</label><br>
                <input type="text" name="nome" id="nome" placeholder="Digite nome completo" required><br>
                <label for="email">E-mail:</label><br>
                <input type="email" name="email" id="email" placeholder="exemplo@mail.com" required><br>
                <label for="datanasc">Data de nascimento:</label><br>
                <input type="date" name="datanasc" id="datanasc"><br>
            </fieldset><br>
            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <label for="curso">Curso:</label><br>
                <select name="curso" id="curso">
                    <option value="dsm">DSM</option>
                    <option value="ads">ADS</option>
                    <option value="outro">Outro</option>
                </select><br>
                <label for="periodo">Período:</label><br>
                <input type="radio" name="periodo" id="manha">Manhã
                <input type="radio" name="periodo" id="noite">Noite
                <br>
                <label for="observacoes">Observações</label><br>
                <textarea rows="5" cols="40" name="observacoes" id="observacoes" placeholder="Escreva aqui suas observações, se houver."></textarea>
            </fieldset><br>
            <fieldset>
                <legend>Envio do formulário:</legend>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </fieldset>
         </form>
    </main>
    <footer>
        <p>&copy; Formulários - 2026.</p>
    </footer>
</body>
</html>
