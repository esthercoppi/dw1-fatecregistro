<!-- Estrutura básica HTML -->
<!doctype html>
<!-- Diz ao navegador para utilizar a última versão do HTML -->
<html lang="pt-BR">
  <!-- O atributo lang informa o idioma do site -->

  <!-- no head, irão as metatags (metadados - informações do site) -->
  <!-- Identação (níveis): hierarquia; head e body são tags "irmãs", porque estão no mesmo nível de identação e são "filhos" da tag html. Um nível de identação -->
  <head>
    <!-- a tag meta não tem tag de fechamento </> -->
    <!-- charset indica o conjunto de caracteres -->
    <meta charset="UTF-8" />
    <!-- o viewport permite apresentar uma melhor visualização em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- título exibido na barra do navegador -->
    <title>Meu Website</title>
  </head>
  <!-- A partir do body, vem o conteúdo do site de fato, que o usuário irá visualizar -->
  <body>
    <!-- dois níveis de identação, "netos" do html -->
    <h1>Meu site</h1>
    <p>Bem-vindo ao meu site</p>
  </body>
</html>
