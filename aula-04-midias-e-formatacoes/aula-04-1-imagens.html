<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de fotos</title>
</head>
<body>
    <header>
        <h1>Galeria de fotos:</h1>
    </header>
    <main>
        <section>

            <!-- Importando imagem local -->
            <img src="midias/imagem.jpg" alt="Paisagem" width="300px" height="300px">
                
            <br><br><br> <!-- serve para quebrar linha no HTML5 -->

            <!-- Importando imagens externas -->

            <img src="https://picsum.photos/id/100/300/200" alt="Imagem 01"> <!-- id da foto / largura / altura -->
            <img src="https://picsum.photos/id/120/300/200" alt="Imagem 02"> <!-- seleciona texto > shift + alt + seta para baixo para duplicar texto -->
            <img src="https://picsum.photos/id/26/300/200" alt="Imagem 03"> 
            <img src="https://picsum.photos/id/121/300/200" alt="Imagem 04">
            <img src="https://picsum.photos/id/192/300/200" alt="Imagem 05"> 
            <img src="https://picsum.photos/id/27/300/200" alt="Imagem 06"> 
            <img src="https://picsum.photos/id/53/300/200" alt="Imagem 07"> 
            <img src="https://picsum.photos/id/10/300/200" alt="Imagem 08"> 
            <img src="https://picsum.photos/id/122/300/200" alt="Imagem 09"> 
            <img src="https://picsum.photos/id/20/300/200" alt="Imagem 10"> 
        </section>

        <br><br><br>

        <!-- Imagem com legenda -->

        <section>
            <figure>
                <img src="midias/grafico.png" alt="Gráfico de crescimento anual da empresa." width="300px">
                <figcaption>Gráfico de crescimento da empresa no ano de 2025.</figcaption>
            </figure>
        </section>

    </main>
    <br>
    <footer>
        <p><em>&copy; 2026 - FATEC Registro - DSM</em></p>
    </footer>
</body>
</html>
